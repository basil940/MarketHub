<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live Dashboard — MarketHub</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      color: #f1f5f9;
      background: #08101c;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --surface: rgba(15,23,42,0.82);
      --surface-strong: rgba(14,18,32,0.96);
      --border: rgba(148,163,184,0.16);
      --text-muted: #94a3b8;
      --accent: #7dd3fc;
      --accent-strong: #22d3ee;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      background: radial-gradient(circle at top, rgba(59,130,246,0.14), transparent 34%), radial-gradient(circle at right, rgba(16,185,129,0.14), transparent 28%), #07111d;
      color: var(--text-muted);
    }

    body {
      font-smooth: antialiased;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      padding: 1rem;
    }

    .navbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      border-radius: 24px;
      background: rgba(8, 17, 28, 0.88);
      border: 1px solid rgba(148,163,184,0.12);
      backdrop-filter: blur(18px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.18);
      max-width: 1300px;
      margin: 0 auto 1.5rem;
    }

    .navbar .logo {
      color: #7dd3fc;
      font-size: 1.5rem;
      font-weight: 800;
      text-decoration: none;
    }

    .navbar .subtitle {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .nav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .nav-right a {
      color: #cbd5e1;
      text-decoration: none;
      font-size: 0.95rem;
      padding: 0.65rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.14);
      transition: transform 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .nav-right a:hover {
      transform: translateY(-1px);
      color: #ffffff;
      border-color: rgba(125,211,252,0.4);
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--success);
      display: inline-block;
      margin-right: 8px;
      box-shadow: 0 0 0 0 rgba(74,222,128,0.6);
      animation: pulse 1.4s infinite ease-out;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.6); }
      70% { box-shadow: 0 0 0 12px rgba(74,222,128,0); }
      100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
    }

    .conn-status {
      font-size: 0.85rem;
      color: #cbd5e1;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 2.1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    .dashboard-hero {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.5rem;
      border-radius: 24px;
      background: rgba(15,23,42,0.88);
      border: 1px solid rgba(148,163,184,0.12);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 55px rgba(0,0,0,0.16);
    }

    .hero-copy {
      max-width: 720px;
    }

    .hero-copy h1 {
      font-size: clamp(2rem, 2.5vw, 3rem);
      color: #ffffff;
      line-height: 1.05;
      margin-bottom: 0.5rem;
    }

    .hero-copy p {
      color: #cbd5e1;
      font-size: 1rem;
      max-width: 620px;
    }

    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.75rem 1rem;
      border-radius: 999px;
      background: rgba(34,197,94,0.15);
      color: #a7f3d0;
      font-size: 0.95rem;
      border: 1px solid rgba(34,197,94,0.18);
      white-space: nowrap;
    }

    .stats-grid {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1rem;
    }

    .stat-card {
      background: rgba(15,23,42,0.88);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 1.5rem;
      color: #e2e8f0;
      box-shadow: 0 18px 40px rgba(0,0,0,0.12);
      position: relative;
      overflow: hidden;
      min-height: 140px;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(125,211,252,0.08) 0%, transparent 50%);
      opacity: 0.7;
      pointer-events: none;
    }

    .stat-card > * {
      position: relative;
      z-index: 1;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.85rem;
    }

    .stat-value {
      font-size: 2.3rem;
      font-weight: 800;
      color: #f8fafc;
      margin-bottom: 0.5rem;
    }

    .stat-card.green .stat-value {
      color: #78d6f4;
    }

    .stat-card.orange .stat-value {
      color: #fb923c;
    }

    .stat-card.blue .stat-value {
      color: #60a5fa;
    }

    .stat-sub {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .panel {
      background: rgba(15,23,42,0.92);
      border: 1px solid rgba(148,163,184,0.12);
      border-radius: 24px;
      padding: 1.75rem;
      box-shadow: 0 24px 48px rgba(0,0,0,0.16);
    }

    .panel h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      color: #e2e8f0;
    }

    .chart-wrap {
      height: 280px;
    }

    .top-product-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.75rem;
      align-items: center;
      padding: 0.95rem 0;
      border-bottom: 1px solid rgba(148,163,184,0.12);
      font-size: 0.95rem;
      color: #e2e8f0;
    }

    .top-product-row:last-child {
      border-bottom: none;
    }

    .tp-rank {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(56,189,248,0.18);
      color: #7dd3fc;
      font-size: 0.85rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .tp-name {
      color: #e2e8f0;
      font-weight: 600;
    }

    .tp-qty {
      color: #94a3b8;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .feed-panel {
      background: rgba(15,23,42,0.92);
      border: 1px solid rgba(148,163,184,0.12);
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow: 0 24px 48px rgba(0,0,0,0.16);
      max-height: 700px;
      overflow-y: auto;
    }

    .feed-panel h3 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .feed-item {
      display: flex;
      gap: 0.9rem;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(148,163,184,0.12);
      animation: slideIn 0.35s ease;
    }

    .feed-item:last-child {
      border-bottom: none;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .feed-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .feed-icon.order { background: rgba(59,130,246,0.18); color: #80bfff; }
    .feed-icon.payment { background: rgba(34,197,94,0.16); color: #86efac; }

    .feed-text {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #e2e8f0;
    }

    .feed-text b {
      font-weight: 700;
      color: #ffffff;
    }

    .feed-time {
      font-size: 0.82rem;
      color: #94a3b8;
      margin-top: 0.35rem;
    }

    .feed-empty {
      text-align: center;
      padding: 2rem;
      color: #64748b;
      font-size: 0.95rem;
    }

    .orders-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      color: #e2e8f0;
    }

    .orders-table th {
      text-align: left;
      padding: 0.9rem 0.75rem;
      color: #94a3b8;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      border-bottom: 1px solid rgba(148,163,184,0.12);
    }

    .orders-table td {
      padding: 0.9rem 0.75rem;
      border-bottom: 1px solid rgba(148,163,184,0.12);
    }

    .badge {
      padding: 0.4rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .badge.paid { background: rgba(74,222,128,0.16); color: #a7f3d0; }
    .badge.unpaid { background: rgba(251,191,36,0.16); color: #fde68a; }

    .loading {
      text-align: center;
      padding: 3rem;
      color: #94a3b8;
    }

    @media (max-width: 1120px) {
      .container { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 720px) {
      .navbar { flex-direction: column; align-items: flex-start; }
      .nav-right { width: 100%; justify-content: space-between; }
      .stats-grid { grid-template-columns: 1fr; }
      .dashboard-hero { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/dashboard/">MarketHub</a>
  <span class="subtitle">Live Dashboard</span>
  <div class="nav-right">
    <span class="conn-status" id="conn-status"><span class="live-dot" id="live-dot"></span>Connecting...</span>
    <a href="/">← Back to Store</a>
  </div>
</nav>

<div class="container">

  <div class="stats-grid" id="stats-grid">
    <div class="stat-card green">
      <div class="stat-label">Total Revenue</div>
      <div class="stat-value" id="s-revenue">—</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Total Orders</div>
      <div class="stat-value" id="s-orders">—</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-label">Orders Today</div>
      <div class="stat-value" id="s-orders-today">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending Orders</div>
      <div class="stat-value" id="s-pending">—</div>
    </div>
  </div>

  <div>
    <div class="panel">
      <h3>Revenue — Last 7 Days</h3>
      <div class="chart-wrap"><canvas id="revenueChart"></canvas></div>
    </div>

    <div class="panel">
      <h3>Top Selling Products</h3>
      <div id="top-products-list"><div class="loading">Loading...</div></div>
    </div>

    <div class="panel">
      <h3>Recent Orders</h3>
      <table class="orders-table">
        <thead>
          <tr><th>Order</th><th>User</th><th>Amount</th><th>Status</th><th>Time</th></tr>
        </thead>
        <tbody id="recent-orders-tbody">
          <tr><td colspan="5" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="feed-panel">
    <h3>🔴 Live Activity</h3>
    <div id="activity-feed">
      <div class="feed-empty">Waiting for activity...</div>
    </div>
  </div>

</div>

<script src="/static/js/api.js"></script>
<script>
  if (!isLoggedIn()) window.location.replace('/login');

  let revenueChart = null;
  let feedHasItems = false;

  function timeAgo() {
    return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function addFeedItem(html) {
    const feed = document.getElementById('activity-feed');
    if (!feedHasItems) {
      feed.innerHTML = '';
      feedHasItems = true;
    }
    const div = document.createElement('div');
    div.className = 'feed-item';
    div.innerHTML = html;
    feed.insertBefore(div, feed.firstChild);

    // keep max 30 items
    while (feed.children.length > 30) {
      feed.removeChild(feed.lastChild);
    }
  }

  function handleEvent(data) {
    if (data.event === 'new_order') {
      addFeedItem(`
        <div class="feed-icon order">🛒</div>
        <div>
          <div class="feed-text"><b>${data.username}</b> placed Order #${data.order_id} — ₹${parseFloat(data.amount).toLocaleString('en-IN')}</div>
          <div class="feed-time">${timeAgo()}</div>
        </div>`);
    } else if (data.event === 'payment_confirmed') {
      addFeedItem(`
        <div class="feed-icon payment">✅</div>
        <div>
          <div class="feed-text"><b>${data.username}</b> paid for Order #${data.order_id} — ₹${parseFloat(data.amount).toLocaleString('en-IN')}</div>
          <div class="feed-time">${timeAgo()}</div>
        </div>`);
    }
    loadStats(); // refresh stats on every event
  }

  // ── WebSocket connection ──
  function connectWS() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${window.location.host}/ws/dashboard/`);

    ws.onopen = () => {
      document.getElementById('conn-status').innerHTML = '<span class="live-dot" id="live-dot"></span>Live';
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      handleEvent(data);
    };

    ws.onclose = () => {
      document.getElementById('conn-status').textContent = 'Disconnected — reconnecting...';
      setTimeout(connectWS, 2000);
    };

    ws.onerror = () => ws.close();
  }

  // ── Stats ──
  async function loadStats() {
    const res = await fetch('/api/dashboard/stats/', { headers: authHeaders() });
    if (!res.ok) {
      if (res.status === 403) {
        document.querySelector('.container').innerHTML = '<div class="loading">Access denied. Admins only.</div>';
      }
      return;
    }
    const data = await res.json();

    document.getElementById('s-revenue').textContent = '₹' + data.total_revenue.toLocaleString('en-IN', {maximumFractionDigits: 0});
    document.getElementById('s-orders').textContent = data.total_orders;
    document.getElementById('s-orders-today').textContent = data.orders_today;
    document.getElementById('s-pending').textContent = data.pending_orders;

    // Chart
    const labels = data.revenue_chart.map(d => d.date);
    const values = data.revenue_chart.map(d => d.revenue);

    if (revenueChart) {
      revenueChart.data.labels = labels;
      revenueChart.data.datasets[0].data = values;
      revenueChart.update();
    } else {
      const ctx = document.getElementById('revenueChart').getContext('2d');
      revenueChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Revenue (₹)',
            data: values,
            borderColor: '#169b67',
            backgroundColor: 'rgba(22,155,103,0.08)',
            fill: true,
            tension: 0.35,
            pointRadius: 3,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true } }
        }
      });
    }

    // Top products
    const tpEl = document.getElementById('top-products-list');
    if (!data.top_products.length) {
      tpEl.innerHTML = '<div class="feed-empty">No sales yet</div>';
    } else {
      tpEl.innerHTML = data.top_products.map((p, i) => `
        <div class="top-product-row">
          <span class="tp-rank">${i + 1}</span>
          <span class="tp-name">${p.product_name}</span>
          <span class="tp-qty">${p.total_qty} sold</span>
        </div>`).join('');
    }

    // Recent orders
    const tbody = document.getElementById('recent-orders-tbody');
    if (!data.recent_orders.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="loading">No orders yet</td></tr>';
    } else {
      tbody.innerHTML = data.recent_orders.map(o => `
        <tr>
          <td>#${o.id}</td>
          <td>${o.username}</td>
          <td>₹${parseFloat(o.amount).toLocaleString('en-IN')}</td>
          <td><span class="badge ${o.payment_status}">${o.payment_status}</span></td>
          <td>${o.created_at}</td>
        </tr>`).join('');
    }
  }

  loadStats();
  connectWS();
  setInterval(loadStats, 15000); // refresh every 15s as fallback
</script>
</body>
</html>
